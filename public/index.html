<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicHub - 音乐平台</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-brand">🎵 MusicHub</div>
    <div class="nav-links" id="navLinks">
      <a href="#home" class="nav-link active" data-page="home">首页</a>
      <a href="#admin" class="nav-link admin-only" data-page="admin" style="display:none">管理后台</a>
      <span class="nav-user" id="navUser"></span>
    </div>
  </nav>

  <!-- 登录页面 -->
  <div class="login-container" id="authPage">
    <div class="login-card">
      <div class="login-header">
        <h1>🎵 MusicHub</h1>
        <p>登录你的音乐账号</p>
      </div>
      
      <!-- 登录表单 -->
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" name="email" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn-primary">登录</button>
      </form>
      
      <p style="text-align:center;margin-top:1rem;color:var(--text-secondary);font-size:0.9rem">
        还没有账号？<a href="#" id="switchToRegister" style="color:var(--primary-light)">立即注册</a>
      </p>
      
      <!-- 注册表单 -->
      <form class="login-form" id="registerForm" style="display:none">
        <div class="form-group">
          <label>用户名</label>
          <input type="text" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" name="email" placeholder="请输入邮箱" required>
        </div>
        <div class="form-group">
          <label>密码</label>
          <input type="password" name="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn-primary">注册</button>
      </form>
      
      <p style="text-align:center;margin-top:1rem;color:var(--text-secondary);font-size:0.9rem">
        已有账号？<a href="#" id="switchToLogin" style="color:var(--primary-light)">立即登录</a>
      </p>
    </div>
  </div>

  <!-- 首页 -->
  <div class="home-page" id="homePage" style="display:none">
    <div class="container">
      <div class="page-header">
        <h1>🎵 发现好音乐</h1>
        <p class="subtitle" id="welcomeText">欢迎回来</p>
      </div>
      
      <!-- 歌曲网格 -->
      <div class="song-grid" id="songList">
        <div class="empty-state">
          <div class="empty-icon">🎶</div>
          <p>暂无歌曲</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 管理后台 -->
  <div class="admin-page" id="adminPage" style="display:none">
    <div class="container">
      <div class="page-header">
        <h1>⚙️ 管理后台</h1>
        <p class="subtitle">管理你的音乐库</p>
      </div>
      
      <!-- 统计卡片 -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon purple">🎵</div>
          <div class="stat-info">
            <h3 id="statSongs">0</h3>
            <p>歌曲总数</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue">👥</div>
          <div class="stat-info">
            <h3 id="statUsers">0</h3>
            <p>注册用户</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">▶️</div>
          <div class="stat-info">
            <h3 id="statPlays">0</h3>
            <p>总播放量</p>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange">❤️</div>
          <div class="stat-info">
            <h3 id="statLikes">0</h3>
            <p>总收藏数</p>
          </div>
        </div>
      </div>
      
      <!-- 上传表单 -->
      <div class="admin-section">
        <h2>📤 上传新音乐</h2>
        
        <!-- 音频文件选择区域 -->
        <div class="upload-area">
          <input type="file" id="audioFile" accept="audio/*" style="display:none">
          <div class="upload-dropzone" id="dropZone">
            <div class="upload-icon">🎵</div>
            <div class="upload-text">点击选择音频文件 或 拖拽文件到这里</div>
            <div class="upload-hint">支持 MP3、OGG、WAV、FLAC 格式</div>
          </div>
          <div class="file-info" id="fileInfo" style="display:none">
            <div class="file-name" id="fileName"></div>
            <div class="file-meta">
              <span id="fileDuration">时长: --:--</span>
              <span id="fileSize">大小: --</span>
            </div>
          </div>
        </div>
        
        <form class="upload-form" id="uploadForm">
          <div class="form-row">
            <div class="form-group">
              <label>歌曲名称 *</label>
              <input type="text" name="title" id="inputTitle" placeholder="请输入歌曲名称" required>
            </div>
            <div class="form-group">
              <label>歌手</label>
              <input type="text" name="artist" id="inputArtist" placeholder="请输入歌手名">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>专辑</label>
              <input type="text" name="album" id="inputAlbum" placeholder="请输入专辑名">
            </div>
            <div class="form-group">
              <label>风格</label>
              <select name="genre" id="inputGenre">
                <option value="流行">流行</option>
                <option value="摇滚">摇滚</option>
                <option value="民谣">民谣</option>
                <option value="古典">古典</option>
                <option value="爵士">爵士</option>
                <option value="电子">电子</option>
                <option value="嘻哈">嘻哈</option>
                <option value="其他">其他</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>时长（秒）</label>
              <input type="number" name="duration" id="inputDuration" value="180">
            </div>
          </div>
          
          <!-- 封面上传 -->
          <div class="cover-upload-row">
            <div class="cover-upload-area">
              <input type="file" id="coverFile" accept="image/*" style="display:none">
              <div class="cover-dropzone" id="coverDropZone">
                <div class="cover-icon">🖼️</div>
                <div class="cover-text">点击上传封面</div>
                <div class="cover-hint">支持 JPG、PNG</div>
              </div>
              <div class="cover-preview" id="coverPreview" style="display:none">
                <img id="coverImage" src="" alt="封面预览">
                <button type="button" class="cover-remove" id="coverRemove">✕</button>
              </div>
            </div>
          </div>
          
          <input type="hidden" name="url" id="inputUrl">
          <button type="submit" class="btn-primary" id="submitBtn">🎵 上传音乐</button>
        </form>
      </div>
      
      <!-- 歌曲管理 -->
      <div class="admin-section">
        <h2>🎶 歌曲管理</h2>
        <div class="song-list" id="adminSongList">
          <div class="empty-state">
            <div class="empty-icon">🎵</div>
            <p>暂无歌曲，点击上方上传音乐</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 播放器 - 简洁版 -->
  <div class="player-bar" id="player" style="display:none">
    <div class="player-song">
      <img class="player-cover" id="playerCover" src="" alt="封面">
      <div>
        <div class="player-title" id="playerTitle">未播放</div>
        <div class="player-artist" id="playerArtist">--</div>
      </div>
    </div>
    <div class="player-center">
      <div class="player-btns">
        <button class="player-btn" id="prevBtn">⏮</button>
        <button class="player-btn play-btn" id="playBtn">▶</button>
        <button class="player-btn" id="nextBtn">⏭</button>
      </div>
      <div class="player-progress">
        <span id="currTime">0:00</span>
        <input type="range" id="progressBar" value="0" max="100">
        <span id="totalTime">0:00</span>
      </div>
    </div>
    <div class="player-right">
      <span>🔊</span>
      <input type="range" id="volumeBar" value="80" max="100">
    </div>
  </div>

  <!-- 提示消息 -->
  <div class="toast" id="toast" style="display:none"></div>

  <!-- 隐藏的音频元素 -->
  <audio id="audioPlayer" style="display:none"></audio>

  <script src="/js/app.js"></script>
</body>
</html>
